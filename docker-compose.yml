# Docker Compose for English-Roleplay

version: '3.8'

services:
  # 单服务：主服务 + pi-agent 集成
  english-roleplay:
    build:
      context: ./server
      dockerfile: Dockerfile.main
    container_name: english-roleplay
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3443:3443"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - AI_MODE=${AI_MODE:-custom}
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - PORT=${PORT:-3000}
      - USE_HTTPS=${USE_HTTPS:-false}
      - HTTPS_PORT=${HTTPS_PORT:-3443}
      # 火山引擎配置
      - VOLC_APP_ID=${VOLC_APP_ID}
      - VOLC_APP_KEY=${VOLC_APP_KEY}
      - VOLC_ACCESS_KEY=${VOLC_ACCESS_KEY}
      - VOLC_SECRET_KEY=${VOLC_SECRET_KEY}
      - VOLC_ASR_APP_ID=${VOLC_ASR_APP_ID:-}
      - VOLC_ASR_TOKEN=${VOLC_ASR_TOKEN:-}
      - VOLC_TTS_APP_ID=${VOLC_TTS_APP_ID:-}
      - VOLC_TTS_TOKEN=${VOLC_TTS_TOKEN:-}
    volumes:
      - ./server/logs:/app/logs
      - ./server/ssl:/app/ssl:ro
    networks:
      - english-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

networks:
  english-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
